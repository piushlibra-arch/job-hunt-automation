name: Daily Job Hunt

on:
  schedule:
    - cron: "30 2 * * *"   # 08:00 IST (02:30 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  hunt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python scripts/fetch_jobs.py

      - name: Commit updated tracker
        run: |
          git config user.name "job-bot"
          git config user.email "bot@users.noreply.github.com"
          git add JOBS.md
          git commit -m "Update job matches" || echo "no changes"
          git push