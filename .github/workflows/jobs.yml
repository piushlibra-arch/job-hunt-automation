name: Daily Job Hunt

on:
  schedule:
    # Runs every day at 08:00 IST (02:30 UTC)
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hunt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run job fetcher
        run: uv run python scripts/fetch_jobs.py

      - name: Commit updated tracker
        run: |
          git config user.name "job-bot"
          git config user.email "bot@users.noreply.github.com"

          git add JOBS.md

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Update job matches"
          git push
